name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # httpx is a test-only dep for starlette/fastapi TestClient (used by
          # the API smoke step below); it is not needed to run the service under
          # uvicorn, so it is intentionally kept out of requirements.txt.
          pip install "httpx==0.28.1"

      - name: Import smoke (package + all modules)
        run: PYTHONPATH=src python -c "import ecg_triage; from ecg_triage import data, preprocess, model, evaluate, train, check; print('imports OK')"

      - name: Readiness check (models present; dataset not shipped, so may report NOT READY)
        run: PYTHONPATH=src python -m ecg_triage.check || true

      - name: API smoke test (loads committed weights + one /predict)
        run: |
          PYTHONPATH=. python - <<'PY'
          import math
          from fastapi.testclient import TestClient
          from api.main import app
          with TestClient(app) as c:
              r = c.get("/")
              assert r.status_code == 200, r.status_code
              assert abs(r.json()["auroc"] - 0.9249) < 1e-9, r.json()
              # A valid (non-flat, finite) 12x1000 signal must predict cleanly.
              ecg = [[math.sin(t / 10.0 + k) for t in range(1000)] for k in range(12)]
              p = c.post("/predict", json={"ecg_data": ecg, "mode": "high_safety"})
              assert p.status_code == 200, (p.status_code, p.text)
              assert p.json()["model_version"] == "2.0.0", p.json()
              # A degenerate (all-flat) signal must be rejected 422, never 500/NaN.
              flat = [[0.0] * 1000 for _ in range(12)]
              d = c.post("/predict", json={"ecg_data": flat, "mode": "high_safety"})
              assert d.status_code == 422, (d.status_code, d.text)
          print("API smoke OK")
          PY
